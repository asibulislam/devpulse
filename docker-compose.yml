version: "3.8"

services:
  db:
    image: postgres:16
    container_name: devpulse_db
    restart: always
    environment:
      POSTGRES_USER: devpulse_user
      POSTGRES_PASSWORD: devpulse_pass
      POSTGRES_DB: devpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devpulse_user -d devpulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: devpulse_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: