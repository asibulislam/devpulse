version: "3.8"

services:
  db:
    image: postgres:16
    container_name: devpulse_db
    restart: always
    environment:
      POSTGRES_USER: devpulse_user
      POSTGRES_PASSWORD: devpulse_pass
      POSTGRES_DB: devpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: